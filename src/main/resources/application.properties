# Server Configuration
server.port=8080

# Multipart Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# WebSocket / SockJS Configuration
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Configuration
# A secure HS256 key will be generated automatically if this is not provided
cybershield.jwt.secret=${JWT_SECRET:}
cybershield.jwt.expiration-ms=86400000

# Mail Configuration (Mocked/Disabled by default, override for real mail server)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Console logging
logging.level.org.springframework.security=INFO
logging.level.com.cybershield.portal=DEBUG
