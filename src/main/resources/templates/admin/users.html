<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/dashboard}" class="text-secondary text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Back to Control Panel</a>
    </div>

    <div class="text-center mb-5">
        <span class="badge badge-medium mb-3 px-3 py-2 text-uppercase fw-bold"><i class="fa-solid fa-users me-1"></i> Administrative Portal</span>
        <h1 class="display-5 font-heading text-white mb-2">User Accounts Management</h1>
        <p class="text-secondary col-md-8 mx-auto">Inspect and audits accounts, roles, and profiles registered on the CyberShield platform.</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card p-4">
                <h5 class="text-white font-heading mb-4"><i class="fa-solid fa-users-gear text-cyan me-1"></i> Registered User Accounts</h5>
                
                <div class="table-responsive">
                    <table class="table table-cyber align-middle mb-0">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>Full Name</th>
                                <th>Email Address</th>
                                <th>Phone Number</th>
                                <th>Security Role</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td class="fw-bold text-white" th:text="${u.id}">1</td>
                                <td th:text="${u.name}">Full Name</td>
                                <td th:text="${u.email}">email@domain.com</td>
                                <td th:text="${u.phone}">+10000000000</td>
                                <td>
                                    <span th:class="'badge ' + 
                                                  (${u.role == 'ROLE_ADMIN'} ? 'badge-critical' : 
                                                  (${u.role == 'ROLE_ANALYST'} ? 'badge-purple' : 'badge-safe'))"
                                          th:text="${u.role}">ROLE_USER</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
