# H2 In-Memory Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Dialect for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable real WebSockets or messaging listeners in tests if needed
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Secure key for tests
cybershield.jwt.secret=cybershield_portal_secure_jwt_secret_key_with_at_least_256_bits
cybershield.jwt.expiration-ms=86400000
